---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/headlamp

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 15m
  releaseName: headlamp
  targetNamespace: default
  chart:
    spec:
      chart: headlamp
      version: '>=1.0.0'
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  values:
    config:
      inCluster: true
      unsafeUseServiceAccountToken: true
      pluginsDir: /headlamp/plugins
      watchPlugins: true
    serviceAccount:
      create: true
      name: headlamp
    clusterRoleBinding:
      create: true
      clusterRoleName: cluster-admin
    automountServiceAccountToken: true
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-k8s/cert-manager
            version: "0.1.0"
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-k8s/flux
            version: "0.6.0"
        installOptions:
          parallel: true
          maxConcurrent: 2
      baseImage: node:lts-alpine
      version: latest
    ingress:
      enabled: true
      ingressClassName: ""
      hosts:
        - host: headlamp.10.0.0.16.nip.io
          paths:
            - path: /
              pathType: Prefix
