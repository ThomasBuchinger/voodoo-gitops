---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubernetes-mcp-server
  namespace: flux-system
spec:
  interval: 24h
  url: oci://ghcr.io/containers/charts


---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kubernetes-mcp-server
  namespace: flux-system
spec:
  type: "oci"
  interval: 24h
  url: oci://ghcr.io/containers/charts

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-kubernetes
  namespace: flux-system
spec:
  interval: 5m
  releaseName: mcp-kubernetes
  targetNamespace: default
  chart:
    spec:
      chart: kubernetes-mcp-server
      version: '>=0.50.0'
      sourceRef:
        kind: HelmRepository
        name: kubernetes-mcp-server
        namespace: flux-system
      interval: 5m
  values:
    config:
      list_output: yaml
    ingress:
      enabled: true
      host: k8s-mcp.10.0.0.16.nip.io
    image:
      version: v0.0.59
    rbac:
      extraClusterRoles:
      - name: read-only
        rules:
        - apiGroups: ["*"]
          resources: ["*"]
          verbs: ["get", "list"]
      extraClusterRoleBindings:
      - name: read-only
        roleRef:
          name: read-only
